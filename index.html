<!DOCTYPE html>
<html>
<head>
  <title>Cyan's Noise Suppressor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cyan's Noise Suppressor</h1>

<input type="file" id="fileInput" accept="audio/*">
<p id="filename">(file name)</p>

<canvas id="waveCanvas" width="800" height="200"></canvas>

<div class="controls">
  <img src="Play.png" id="play" class="icon">
  <img src="Stop.png" id="stop" class="icon">
  <img src="Save.png" id="download" class="icon">
</div>

<p>Drag the cyan line up/down to adjust suppression</p>

<script src="app.js"></script>
</body>
</html>
